<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1e"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Logo box -->
  <rect x="100" y="165" width="200" height="200" rx="36" fill="#0f0a1e"/>
  <!-- Corner brackets on logo -->
  <path d="M122,210 L122,188 L144,188" fill="none" stroke="url(#ng)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M256,188 L278,188 L278,210" fill="none" stroke="url(#ng)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M278,320 L278,342 L256,342" fill="none" stroke="url(#ng)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M144,342 L122,342 L122,320" fill="none" stroke="url(#ng)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="136" cy="202" r="5" fill="#818cf8" opacity="0.7"/>
  <circle cx="264" cy="202" r="5" fill="#818cf8" opacity="0.7"/>
  <circle cx="136" cy="328" r="5" fill="#818cf8" opacity="0.7"/>
  <circle cx="264" cy="328" r="5" fill="#818cf8" opacity="0.7"/>
  <text x="200" y="300" text-anchor="middle" font-family="Georgia,serif" font-size="120" font-weight="700" fill="url(#ng)">N</text>

  <!-- Main text -->
  <text x="370" y="290" font-family="Arial Black,sans-serif" font-size="96" font-weight="900" fill="url(#tg)">NARHAN</text>
  <text x="370" y="380" font-family="Arial,sans-serif" font-size="52" font-weight="400" fill="#94a3b8" letter-spacing="18">TV</text>

  <!-- Tagline -->
  <text x="100" y="470" font-family="Arial,sans-serif" font-size="28" fill="#64748b">Anime · Manga · Movies · TV Shows · Монгол</text>

  <!-- Bottom accent line -->
  <rect x="100" y="510" width="300" height="4" rx="2" fill="url(#ng)"/>
</svg>
